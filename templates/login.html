<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Auto — {{ "Sign Up" if mode == "signup" else "Login" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0a0b10;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#f0f0f5;--muted:#8b8fa3;--accent-start:#7c3aed;--accent-mid:#3b82f6;--accent-end:#06b6d4;--gradient:linear-gradient(135deg,var(--accent-start),var(--accent-mid),var(--accent-end));--danger:#ef4444;--radius:12px;--font:'Inter',-apple-system,sans-serif}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
        
        .auth-container{width:100%;max-width:440px;padding:2rem}
        .brand{display:flex;align-items:center;gap:.75rem;justify-content:center;margin-bottom:2rem}
        .brand-icon{width:44px;height:44px;background:var(--gradient);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:#fff}
        .brand-icon svg{width:22px;height:22px}
        .brand-text{font-size:1.5rem;font-weight:800;letter-spacing:-.03em}
        
        .auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;backdrop-filter:blur(16px)}
        
        /* Tabs */
        .tabs{display:flex;margin-bottom:2rem;border-bottom:1px solid var(--border);gap:2rem}
        .tab-btn{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:.95rem;font-weight:600;padding-bottom:.75rem;cursor:pointer;position:relative;transition:color .2s}
        .tab-btn:hover{color:var(--text)}
        .tab-btn.active{color:var(--text)}
        .tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent-start);border-radius:2px 2px 0 0}
        
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn 0.3s ease}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .auth-title{font-size:1.4rem;font-weight:700;margin-bottom:.5rem}
        .auth-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}
        
        .form-group{margin-bottom:1.15rem;position:relative}
        .form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em}
        .form-group input{width:100%;padding:.72rem 1rem;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;font-family:var(--font);outline:none;transition:border .2s}
        .form-group input:focus{border-color:rgba(124,58,237,.5);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
        
        .password-input-wrapper {position: relative;}
        .toggle-password {position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 0;}
        .toggle-password:hover {color: var(--text);}

        .remember-group {display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;}
        .remember-group input[type="checkbox"] {accent-color: var(--accent-start); width: 16px; height: 16px;}
        .remember-group label {text-transform: none; font-size: 0.85rem; margin: 0;}

        /* Password Strength */
        .pwd-strength {height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); margin-top: 0.5rem; overflow: hidden; display: none;}
        .pwd-strength-bar {height: 100%; width: 0; transition: all 0.3s ease;}
        .pwd-strength-text {font-size: 0.75rem; margin-top: 0.25rem; display: none; text-align: right;}
        
        .btn-submit{width:100%;padding:.85rem;border:none;border-radius:8px;background:var(--gradient);color:#fff;font-size:.95rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(124,58,237,.3); display: flex; align-items: center; justify-content: center; gap: 0.5rem;}
        .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,58,237,.45)}
        .btn-submit:disabled{opacity:.6;transform:none;cursor:not-allowed}
        
        .switch-link{text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted)}
        .switch-link button{background:none;border:none;color:var(--accent-mid);font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;padding:0}
        .switch-link button:hover{text-decoration:underline}
        
        .error-msg{color:var(--danger);font-size:.82rem;font-weight:500;margin-top: 0.4rem; display:none;}
        .error-msg.show{display:block}
        
        .global-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:.65rem 1rem;margin-bottom:1.5rem;color:var(--danger);font-size:.85rem;font-weight:500;display:none;text-align:center}
        .global-error.show{display:block}

        .spinner {width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: none;}
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </div>
            <span class="brand-text">DM Auto</span>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <button class="tab-btn {{ 'active' if mode != 'signup' else '' }}" onclick="switchTab('login')">Log In</button>
                <button class="tab-btn {{ 'active' if mode == 'signup' else '' }}" onclick="switchTab('register')">Register</button>
            </div>

            <div id="login-tab" class="tab-content {{ 'active' if mode != 'signup' else '' }}">
                <h1 class="auth-title">Welcome Back 👋</h1>
                <p class="auth-sub">Sign in to continue to your dashboard</p>
                <div class="global-error" id="login-global-error"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="login-password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePwd('login-password')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group remember-group">
                        <input type="checkbox" id="login-remember">
                        <label for="login-remember">Remember me for 30 days</label>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-login">
                        <span class="spinner" id="login-spinner"></span>
                        <span id="login-btn-text">Log In</span>
                    </button>
                </form>
                <p class="switch-link">
                    Don't have an account? <button onclick="switchTab('register')">Register</button>
                </p>
            </div>

            <div id="register-tab" class="tab-content {{ 'active' if mode == 'signup' else '' }}">
                <h1 class="auth-title">Create Account ✨</h1>
                <p class="auth-sub">Sign up to start automating your DMs</p>
                <div class="global-error" id="register-global-error"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="register-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="register-password" placeholder="Min 8 characters" required minlength="6" oninput="checkStrength()">
                            <button type="button" class="toggle-password" onclick="togglePwd('register-password')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <div class="pwd-strength" id="pwd-strength-container"><div class="pwd-strength-bar" id="pwd-strength"></div></div>
                        <div class="pwd-strength-text" id="pwd-strength-text">Weak</div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="register-confirm" placeholder="••••••••" required oninput="checkMatch()">
                        <div class="error-msg" id="pwd-match-error">Passwords do not match</div>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-register">
                        <span class="spinner" id="register-spinner"></span>
                        <span id="register-btn-text">Create Account</span>
                    </button>
                </form>
                <p class="switch-link">
                    Already have an account? <button onclick="switchTab('login')">Log In</button>
                </p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            
            // Clear URLs if they have query params
            if (window.history.replaceState) {
                window.history.replaceState(null, null, tab === 'login' ? '/login' : '/signup');
            }
        }

        function togglePwd(id) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        function checkStrength() {
            const val = document.getElementById('register-password').value;
            const container = document.getElementById('pwd-strength-container');
            const bar = document.getElementById('pwd-strength');
            const text = document.getElementById('pwd-strength-text');
            
            if (!val) {
                container.style.display = 'none';
                text.style.display = 'none';
                return;
            }
            container.style.display = 'block';
            text.style.display = 'block';

            let score = 0;
            if (val.length >= 6) score += 25;
            if (val.match(/[A-Z]/)) score += 25;
            if (val.match(/[0-9]/)) score += 25;
            if (val.match(/[^A-Za-z0-9]/)) score += 25;

            bar.style.width = score + '%';
            if (score <= 25) { bar.style.background = '#ef4444'; text.textContent = 'Weak'; text.style.color = '#ef4444'; }
            else if (score <= 50) { bar.style.background = '#f97316'; text.textContent = 'Fair'; text.style.color = '#f97316'; }
            else if (score <= 75) { bar.style.background = '#eab308'; text.textContent = 'Good'; text.style.color = '#eab308'; }
            else { bar.style.background = '#22c55e'; text.textContent = 'Strong'; text.style.color = '#22c55e'; }
            
            checkMatch();
        }

        function checkMatch() {
            const pwd = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const error = document.getElementById('pwd-match-error');
            
            if (confirm && pwd !== confirm) {
                error.classList.add('show');
                return false;
            } else {
                error.classList.remove('show');
                return true;
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const spin = document.getElementById('login-spinner');
            const text = document.getElementById('login-btn-text');
            const err = document.getElementById('login-global-error');
            
            btn.disabled = true;
            spin.style.display = 'block';
            text.textContent = 'Logging in...';
            err.classList.remove('show');

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        email: document.getElementById('login-email').value,
                        password: document.getElementById('login-password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = "/dashboard";
                } else {
                    err.textContent = data.error || "Login failed";
                    err.classList.add('show');
                }
            } catch (e) {
                err.textContent = "Network error occurred";
                err.classList.add('show');
            } finally {
                btn.disabled = false;
                spin.style.display = 'none';
                text.textContent = 'Log In';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!checkMatch()) return;

            const btn = document.getElementById('btn-register');
            const spin = document.getElementById('register-spinner');
            const text = document.getElementById('register-btn-text');
            const err = document.getElementById('register-global-error');
            
            btn.disabled = true;
            spin.style.display = 'block';
            text.textContent = 'Creating account...';
            err.classList.remove('show');

            try {
                const res = await fetch("/api/auth/signup", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        full_name: document.getElementById('register-name').value,
                        email: document.getElementById('register-email').value,
                        password: document.getElementById('register-password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = "/dashboard";
                } else {
                    err.textContent = data.error || "Registration failed";
                    err.classList.add('show');
                }
            } catch (e) {
                err.textContent = "Network error occurred";
                err.classList.add('show');
            } finally {
                btn.disabled = false;
                spin.style.display = 'none';
                text.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
